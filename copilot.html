<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zella Copilot V7</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#020817;
  color:#e5f0ff;
  min-height:100vh;
}

.app{
  min-height:100vh;
  padding:28px 16px 170px;
  background:
    radial-gradient(circle at top right,rgba(37,99,235,.35),transparent 34%),
    linear-gradient(180deg,#07111d,#020817);
}

.header{
  margin-bottom:22px;
}

.label{
  color:#38bdf8;
  letter-spacing:6px;
  font-size:13px;
  margin-bottom:10px;
}

.header h1{
  font-size:36px;
  line-height:1.1;
  color:#f8fafc;
}

.header p{
  color:#94a3b8;
  margin-top:10px;
  line-height:1.5;
}

.status-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}

.status-card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:16px;
}

.status-card span{
  font-size:12px;
  color:#94a3b8;
}

.status-card h3{
  margin-top:8px;
  color:#22c55e;
}

.quick-prompts{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:18px;
}

.quick-prompts button{
  background:#0f172a;
  color:#e5f0ff;
  border:1px solid #263241;
  border-radius:999px;
  padding:11px 15px;
  font-size:14px;
}

.chat-card{
  background:linear-gradient(145deg,#111a26,#0b111a);
  border:1px solid #1f2937;
  border-radius:28px;
  padding:18px;
  min-height:430px;
  max-height:560px;
  overflow-y:auto;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}

.chat-title{
  color:#38bdf8;
  letter-spacing:6px;
  font-size:13px;
  margin-bottom:18px;
}

.message-row{
  display:flex;
  gap:12px;
  margin-bottom:18px;
  align-items:flex-start;
}

.message-row.user{
  justify-content:flex-end;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  flex-shrink:0;
}

.bubble{
  max-width:78%;
  padding:16px;
  border-radius:22px;
  line-height:1.55;
  white-space:pre-wrap;
  word-wrap:break-word;
}

.bot .bubble{
  background:#0f172a;
  border:1px solid #263241;
}

.user .bubble{
  background:#1d4ed8;
  border:1px solid #2563eb;
  color:white;
}

.rich-card{
  background:#081120;
  border:1px solid #1e3a5f;
  border-radius:18px;
  padding:16px;
  margin-top:10px;
}

.rich-card-title{
  font-weight:bold;
  color:#38bdf8;
  margin-bottom:12px;
  font-size:15px;
}

.rich-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.metric{
  background:#0f172a;
  border:1px solid #263241;
  border-radius:14px;
  padding:12px;
}

.metric-label{
  color:#94a3b8;
  font-size:12px;
}

.metric-value{
  margin-top:6px;
  font-size:18px;
  font-weight:bold;
}

.signal-buy{
  color:#22c55e;
}

.signal-watch{
  color:#f59e0b;
}

.signal-avoid{
  color:#ef4444;
}

.bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:76px;
  padding:0 14px;
}

.input-wrap{
  display:flex;
  gap:10px;
  background:#091425;
  border:1px solid #243244;
  border-radius:30px;
  padding:10px;
  backdrop-filter:blur(20px);
}

.input-wrap input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  font-size:16px;
  padding:12px;
}

.send-btn{
  width:62px;
  height:62px;
  border:none;
  border-radius:50%;
  background:#2563eb;
  color:white;
  font-size:24px;
}

.nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:74px;
  background:#091425;
  border-top:1px solid #1f2937;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav a{
  color:#94a3b8;
  text-decoration:none;
  font-size:15px;
}

.nav .active{
  color:#38bdf8;
}

@media(max-width:700px){

.rich-grid{
  grid-template-columns:1fr;
}

.bubble{
  max-width:100%;
}

}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="label">ZELLA AI</div>

<h1>Copilot</h1>

<p>
Trade smarter. Profit faster.
</p>
</div>

<div class="status-grid">

<div class="status-card">
<span>Backend</span>
<h3>ONLINE</h3>
</div>

<div class="status-card">
<span>Verdict Engine</span>
<h3>V4 ACTIVE</h3>
</div>

</div>

<div class="quick-prompts">

<button onclick="quickAsk('What is BTC price?')">
BTC Price
</button>

<button onclick="quickAsk('Scan the market and tell me the strongest setup')">
Strongest Setup
</button>

<button onclick="quickAsk('Rank BTC ETH SOL BNB XRP')">
Rank Assets
</button>

<button onclick="quickAsk('Compare BTC and SOL')">
Compare Coins
</button>

<button onclick="quickAsk('Which coin should I avoid?')">
Avoid Coin
</button>

</div>

<div class="chat-card" id="chat">

<div class="chat-title">
CHAT
</div>

<div class="message-row bot">

<div class="avatar">
Z
</div>

<div class="bubble">
Welcome back Zeus.

Ask me for:

• Live Prices

• Market Rankings

• Strongest Setup

• Coin Comparisons

• Risk Analysis
</div>

</div>

</div>
</div>

<div class="bottom-bar">
  <div class="input-wrap">
    <input id="userInput" placeholder="Ask Zella..." />
    <button class="send-btn" onclick="sendMessage()">›</button>
  </div>
</div>

<div class="nav">
  <a href="dashboard.html">Home</a>
  <a href="market.html">Market</a>
  <a href="scanner.html">Scanner</a>
  <a href="copilot.html" class="active">Copilot</a>
  <a href="alerts.html">Alerts</a>
</div>

<script>
const BACKEND_URL = "https://zella-backend.onrender.com/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("userInput");

function escapeHTML(text){
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function signalClass(text){
  const t = String(text || "").toLowerCase();

  if(t.includes("buy")){
    return "signal-buy";
  }

  if(t.includes("avoid")){
    return "signal-avoid";
  }

  return "signal-watch";
}

function extractValue(text, label){
  const regex = new RegExp(label + "\\\\s*:?\\\\s*([^\\\\n]+)", "i");
  const match = String(text).match(regex);
  return match ? match[1].trim() : "—";
}

function createRichCard(text){
  const title = text.includes("COMPARE") || text.includes("vs")
    ? "⚔️ COIN COMPARISON"
    : text.includes("RANKING") || text.includes("Rank")
    ? "🏆 ZELLA RANKING"
    : text.includes("AVOID")
    ? "⚠️ RISK ALERT"
    : text.includes("LIVE")
    ? "💰 LIVE PRICE"
    : "📊 ZELLA VERDICT";

  const asset = let asset = extractValue(text,"Asset");
let signal = extractValue(text,"Signal");
let confidence = extractValue(text,"Confidence");
let risk = extractValue(text,"Risk");

if(asset === "—"){
  const setupMatch =
    text.match(/Strongest Setup:\s*([A-Z]+)/i);

  if(setupMatch){
    asset = setupMatch[1];
  }
}

if(signal === "—"){
  const m = text.match(/Signal:\s*([A-Z ]+)/i);
  if(m) signal = m[1];
}

if(confidence === "—"){
  const m = text.match(/Confidence:\s*([0-9]+%?)/i);
  if(m) confidence = m[1];
}

if(risk === "—"){
  const m = text.match(/Risk:\s*(Low|Medium|High)/i);
  if(m) risk = m[1];
}
  const signal = extractValue(text, "Signal");
  const confidence = extractValue(text, "Confidence");
  const risk = extractValue(text, "Risk");

  return `
    <div class="rich-card">
      <div class="rich-card-title">${title}</div>

      <div class="rich-grid">
        <div class="metric">
          <div class="metric-label">Asset</div>
          <div class="metric-value">${escapeHTML(asset)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Signal</div>
          <div class="metric-value ${signalClass(signal)}">${escapeHTML(signal)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Confidence</div>
          <div class="metric-value">${escapeHTML(confidence)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Risk</div>
          <div class="metric-value">${escapeHTML(risk)}</div>
        </div>
      </div>
    </div>
  `;
}

function addMessage(text, sender){
  const row = document.createElement("div");
  row.className = "message-row " + sender;

  if(sender === "bot"){
    const card = createRichCard(text);

    row.innerHTML = `
      <div class="avatar">Z</div>
      <div class="bubble">
        ${card}
        <br>
        ${escapeHTML(text)}
      </div>
    `;
  }else{
    row.innerHTML = `
      <div class="bubble">${escapeHTML(text)}</div>
    `;
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const message = input.value.trim();

  if(!message){
    return;
  }

  addMessage(message, "user");
  input.value = "";

  addMessage("Thinking...", "bot");

  try{
    const response = await fetch(BACKEND_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message
      })
    });

    const data = await response.json();

    const lastBot = chat.querySelector(".message-row.bot:last-child");
    if(lastBot){
      lastBot.remove();
    }

    addMessage(data.reply || "Zella could not reply.", "bot");

  }catch(error){
    const lastBot = chat.querySelector(".message-row.bot:last-child");
    if(lastBot){
      lastBot.remove();
    }

    addMessage("Zella backend error. Please try again.", "bot");
  }
}

function quickAsk(text){
  input.value = text;
  sendMessage();
}

input.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    sendMessage();
  }
});
</script>

</body>
</html>
