<!DOCTYPE html>
<html>
<head>
  <title>Zella Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="top-label">AI Copilot · Live</div>
  <h1>Ask ZELLA.</h1>
  <p class="muted">Trade Smarter. Profit Faster.</p>

  <br>

  <div class="card">
    <div class="asset">
      <input placeholder="Ask about any coin, setup, or risk...">
      <button class="btn">➤</button>
    </div>
  </div>

  <div class="grid-2">
    <button class="btn">Best setup right now?</button>
    <button class="btn">Should I buy BTC?</button>
    <button class="btn">Is ETH overbought?</button>
    <button class="btn">Lowest-risk trade today</button>
  </div>

  <br>

  <div class="card">
    <div class="asset-left">
      <div class="coin eth">✦</div>
      <div>
        <h2>Hi Zeus 👋</h2>
        <p class="muted">
          I'm <span class="blue">ZELLA</span>. I've analyzed BTC, ETH, SOL,
          BNB and XRP across technicals, sentiment and market structure.
        </p>
        <br>
        <p class="muted">Ask me where the best risk-adjusted opportunity is right now.</p>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="dashboard.html">Command</a>
    <a href="market.html">Markets</a>
    <a href="copilot.html" class="active">Copilot</a>
    <a href="alert.html">Alerts</a>
    <a href="journal.html">Wallet</a>
  </div>

</div>

</body>
</html>
