<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zella Portfolio Tracker V2</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="logo">ZELLA</div>
    <div class="avatar-dot">W</div>
  </div>
</nav>

<main class="container">

<section class="command-card">

  <div class="live-row">
    <div>
      <div class="eyebrow">ZELLA WALLET</div>
      <h1 class="command-title">Portfolio<br>Tracker.</h1>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <div class="live-dot"></div>
      <span class="live-label">LIVE</span>
    </div>
  </div>

  <p class="briefing-text">
    Track holdings, estimate portfolio value, monitor allocation,
    calculate profit/loss and let Zella review your risk exposure.
  </p>

</section>

<section class="mini-grid">

  <div class="mini-box">
    <div class="mini-label">Portfolio Value</div>
    <div class="mini-value green" id="portfolioValue">$0</div>
  </div>

  <div class="mini-box">
    <div class="mini-label">Total PnL</div>
    <div class="mini-value blue" id="portfolioPnl">$0</div>
  </div>

  <div class="mini-box">
    <div class="mini-label">Best Asset</div>
    <div class="mini-value orange" id="bestAsset">--</div>
  </div>

  <div class="mini-box">
    <div class="mini-label">Holdings</div>
    <div class="mini-value blue" id="holdingCount">0</div>
  </div>

</section>

<section class="command-card">

  <div class="card-label">ADD HOLDING</div>

  <div class="chat-input-bar">
    <input id="coinSymbol" placeholder="Coin e.g BTC" />
    <input id="coinAmount" placeholder="Amount e.g 0.05" />
    <input id="coinEntry" placeholder="Entry price e.g 65000" />
    <button onclick="addHolding()">Add</button>
  </div>

</section>

<script>

const API_URL = "https://zella-backend.onrender.com";

let holdings =
  JSON.parse(localStorage.getItem("zellaHoldingsV2")) || [];

function saveHoldings(){
  localStorage.setItem(
    "zellaHoldingsV2",
    JSON.stringify(holdings)
  );
}

function addHolding(){

  const symbol =
    document.getElementById("coinSymbol").value.trim().toUpperCase();

  const amount =
    Number(document.getElementById("coinAmount").value);

  const entry =
    Number(document.getElementById("coinEntry").value);

  if if(!symbol || amount <= 0 || entry <= 0){
    alert("Please complete all fields.");
    return;
  }

  holdings.push({
    symbol,
    amount,
    entry
  });

  saveHoldings();

  document.getElementById("coinSymbol").value = "";
  document.getElementById("coinAmount").value = "";
  document.getElementById("coinEntry").value = "";

  loadPortfolio();
}

async function loadPortfolio(){

  try{

    const response =
      await fetch(API_URL + "/scanner");

    const data =
      await response.json();

    const assets =
      data.items || [];

    let portfolioValue = 0;
    let totalPnl = 0;
    let bestAsset = "--";

    const values = [];

    const holdingsHtml =
      holdings.map((holding,index)=>{

        const asset =
  assets.find(
    x => String(x.asset).toUpperCase() === String(holding.symbol).toUpperCase()
  );

        const price =
          asset
          ? Number(asset.price)
          : 0;

        const value =
          holding.amount * price;

        const cost =
          holding.amount * holding.entry;

        const pnl =
          value - cost;

        portfolioValue += value;
        totalPnl += pnl;

        values.push({
          symbol: holding.symbol,
          value
        });

        return `
          <div class="rank-row">

            <div class="rank-position">
              #${index + 1}
            </div>

            <div class="rank-asset">
              ${holding.amount} ${holding.symbol}
            </div>

            <div class="rank-score">
              $${value.toLocaleString()}
            </div>

          </div>
        `;

      }).join("");

    const allocationHtml =
      values.map(item => {

        const allocation =
          portfolioValue > 0
          ? ((item.value / portfolioValue) * 100).toFixed(1)
          : 0;

        return `
          <div class="rank-row">

            <div class="rank-position">
              ${allocation}%
            </div>

            <div class="rank-asset">
              ${item.symbol}
            </div>

            <div class="rank-score">
              $${item.value.toLocaleString()}
            </div>

          </div>
        `;

      }).join("");

    if(values.length){

      bestAsset =
        values.sort(
          (a,b) => b.value - a.value
        )[0].symbol;

    }

    document.getElementById("holdingsList").innerHTML =
      holdingsHtml || `
        <div class="rank-row">
          <div class="rank-position">₿</div>
          <div class="rank-asset">No holdings added yet</div>
          <div class="rank-score">--</div>
        </div>
      `;

    document.getElementById("allocationList").innerHTML =
      allocationHtml || `
        <div class="rank-row">
          <div class="rank-position">%</div>
          <div class="rank-asset">Allocation appears after holdings</div>
          <div class="rank-score">--</div>
        </div>
      `;

    document.getElementById("portfolioValue").textContent =
      "$" + portfolioValue.toLocaleString();

    document.getElementById("portfolioPnl").textContent =
      (totalPnl >= 0 ? "+" : "-") +
      "$" +
      Math.abs(totalPnl).toLocaleString();

    document.getElementById("bestAsset").textContent =
      bestAsset;

    document.getElementById("holdingCount").textContent =
      holdings.length;

    document.getElementById("portfolioHeadline").textContent =
      portfolioValue > 0
      ? `Portfolio Value: $${portfolioValue.toLocaleString()}`
      : "No portfolio data yet.";

    document.getElementById("portfolioSummary").textContent =
      portfolioValue > 0
      ? `Your portfolio contains ${holdings.length} assets. Current value is $${portfolioValue.toLocaleString()} with a total PnL of ${totalPnl >= 0 ? "+" : "-"}$${Math.abs(totalPnl).toLocaleString()}. Largest allocation is currently ${bestAsset}.`
      : "Add your holdings and Zella will estimate portfolio value, PnL and allocation using live market data.";

  }

  catch(error){

    console.error(error);

    document.getElementById("portfolioHeadline").textContent =
      "Portfolio engine unavailable";

    document.getElementById("portfolioSummary").textContent =
      "Unable to connect to market data.";

  }

}

loadPortfolio();

setInterval(
  loadPortfolio,
  30000
);

</script>
