<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zella Settings</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{
font-family:Arial,sans-serif;
background:#050b12;
color:#f8fafc;
}

.app{
width:100%;
min-height:100vh;
padding:42px 16px 170px;
background:
radial-gradient(circle at top right,rgba(37,99,235,.35),transparent 35%),
linear-gradient(180deg,#07111d,#050b12);
}

.top-label{
color:#9ca3af;
font-size:12px;
letter-spacing:5px;
text-transform:uppercase;
margin-bottom:10px;
}

h1{
font-size:36px;
color:#d8ecff;
margin-bottom:20px;
}

.card{
background:linear-gradient(145deg,#111a26,#0b111a);
border:1px solid #1f2937;
border-radius:26px;
padding:22px;
margin-bottom:70px;
}

.card-title{
color:#38bdf8;
font-size:14px;
letter-spacing:4px;
text-transform:uppercase;
margin-bottom:16px;
}

input,select{
width:100%;
padding:14px;
background:#101722;
border:1px solid #263241;
border-radius:16px;
color:white;
margin-bottom:12px;
}

.setting{
padding:16px;
border-radius:18px;
background:#101722;
border:1px solid #263241;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-weight:bold;
}

.green{color:#4ade80}
.orange{color:#f59e0b}
.blue{color:#4dabff}
.muted{color:#9ca3af}

.bottom-nav{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 32px);
max-width:460px;
background:rgba(15,23,42,.92);
border:1px solid #263241;
border-radius:30px;
padding:12px;
display:flex;
justify-content:space-between;
}

.bottom-nav a{
color:#9ca3af;
text-decoration:none;
padding:10px;
}

.bottom-nav a.active{
color:#4dabff;
}
</style>
</head>

<body>

<div class="app">

<div class="top-label">
ZELLA AI • SETTINGS
</div>

<h1>Setup</h1>

<div class="card">

<div class="card-title">
EXCHANGE CONNECTION
</div>

<input type="text" placeholder="Binance API Key">

<input type="password" placeholder="Binance Secret Key">

<button>Connect Exchange</button>

</div>

<div class="card">

<div class="card-title">
RISK MANAGEMENT
</div>

<select>
<option>Risk Per Trade</option>
<option>1%</option>
<option>2%</option>
<option>3%</option>
<option>5%</option>
</select>

<select>
<option>Trading Style</option>
<option>Scalping</option>
<option>Day Trading</option>
<option>Swing Trading</option>
</select>

</div>

<div class="card">

<div class="card-title">
ZELLA PREFERENCES
</div>

<div class="setting">
<h3>AI Signals</h3>
<p class="muted">Enabled</p>
</div>

<div class="setting">
<h3>Push Notifications</h3>
<p class="muted">Enabled</p>
</div>

<div class="setting">
<h3>Auto Trading</h3>
<p class="orange">Disabled</p>
</div>

</div>

<div class="card">

<div class="card-title">
ACCOUNT STATUS
</div>

<h2 class="green">Premium Plan</h2>

<br>

<p class="muted">
Real-Time Market Data Active
<br>
AI Copilot Active
<br>
Alerts Active
</p>

</div>

<div class="bottom-nav">
<a href="dashboard.html">Command</a>
<a href="market.html">Markets</a>
<a href="copilot.html">Copilot</a>
<a href="alert.html">Alerts</a>
<a href="setup.html" class="active">Setup</a>
</div>

</div>

</body>
</html>
