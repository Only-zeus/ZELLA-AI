<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZELLA V11 ULTRA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#020817;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
text-align:center;
width:90%;
max-width:500px;
}

.logo{
width:150px;
height:150px;
border-radius:50%;
margin:auto;
margin-bottom:25px;
background:linear-gradient(135deg,#00d4ff,#0066ff);
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
box-shadow:0 0 40px #00d4ff;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

h1{
font-size:52px;
color:#00d4ff;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
margin-bottom:40px;
font-size:18px;
}

.progress-container{
width:100%;
height:20px;
background:#111827;
border-radius:30px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00d4ff,#0066ff);
border-radius:30px;
}

.percent{
margin-top:15px;
font-size:30px;
color:#00d4ff;
font-weight:bold;
}

.loading-text{
margin-top:15px;
color:#94a3b8;
font-size:15px;
}

.version{
margin-top:30px;
font-size:14px;
color:#64748b;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
🤖
</div>

<h1>ZELLA</h1>

<div class="subtitle">
The Ultimate AI Crypto Assistant
</div>

<div class="progress-container">
<div class="progress-bar" id="bar"></div>
</div>

<div class="percent" id="percent">
0%
</div>

<div class="loading-text">
Initializing Zella V11 Ultra...
</div>

<div class="version">
Secure • Intelligent • Unstoppable
</div>

</div>

<script>

let progress = 0;

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

const loader = setInterval(() => {

progress++;

bar.style.width = progress + "%";
percent.innerText = progress + "%";

if(progress >= 100){

clearInterval(loader);

setTimeout(() => {

window.location.href = "dashboard.html";

},1000);

}

},40);

</script>

</body>
</html>
