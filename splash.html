<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zella Loading</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:#020617;
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
z-index:-3;
background:
radial-gradient(circle at 20% 10%,rgba(56,189,248,.25),transparent 30%),
radial-gradient(circle at 80% 10%,rgba(99,102,241,.25),transparent 30%),
radial-gradient(circle at 50% 100%,rgba(34,197,94,.10),transparent 35%),
#020617;
}

.grid-bg{
position:fixed;
inset:0;
z-index:-2;
background-image:
linear-gradient(rgba(56,189,248,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(56,189,248,.05) 1px,transparent 1px);
background-size:40px 40px;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{background-position:0 0;}
to{background-position:0 400px;}
}

.wrapper{
width:92%;
max-width:520px;
}

.card{
padding:35px;
border-radius:34px;
background:rgba(15,23,42,.88);
border:1px solid rgba(148,163,184,.14);
box-shadow:0 25px 70px rgba(0,0,0,.4);
text-align:center;
}

.logo{
font-size:42px;
font-weight:950;
letter-spacing:12px;
}

.logo span{
color:#38bdf8;
}

.orbit{
width:260px;
height:260px;
margin:25px auto;
position:relative;
}

.ring{
position:absolute;
border-radius:50%;
border:1px solid rgba(56,189,248,.3);
animation:spin 15s linear infinite;
}

.r1{inset:0;}
.r2{inset:30px;animation-duration:18s;}
.r3{inset:60px;animation-duration:22s;}
.r4{inset:90px;animation-duration:28s;}

.ring::before{
content:"";
position:absolute;
top:12px;
left:50%;
width:12px;
height:12px;
border-radius:50%;
background:#38bdf8;
box-shadow:0 0 20px #38bdf8;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.core{
position:absolute;
inset:95px;
border-radius:50%;
background:
radial-gradient(circle,
#dff7ff,
#38bdf8 40%,
#082f49 70%,
#020617 100%);
box-shadow:
0 0 60px rgba(56,189,248,.9),
inset 0 0 25px rgba(2,6,23,.8);
}

.scan{
position:absolute;
left:12%;
right:12%;
top:50%;
height:3px;
background:linear-gradient(90deg,transparent,#38bdf8,transparent);
box-shadow:0 0 20px rgba(56,189,248,.9);
animation:scan 3s ease-in-out infinite;
}

@keyframes scan{
0%,100%{
transform:translateY(-40px);
opacity:.3;
}
50%{
transform:translateY(40px);
opacity:1;
}
}

.title{
font-size:34px;
font-weight:900;
margin-top:10px;
}

.subtitle{
margin-top:12px;
color:#94a3b8;
line-height:1.7;
}

.progress-box{
margin-top:28px;
}

.progress-bar{
height:14px;
background:#0f172a;
border-radius:999px;
overflow:hidden;
border:1px solid rgba(148,163,184,.15);
}

.progress-fill{
height:100%;
width:0%;
border-radius:999px;
background:linear-gradient(90deg,#38bdf8,#2563eb,#22c55e);
transition:width .7s ease;
}

.percent{
margin-top:15px;
font-size:30px;
font-weight:950;
color:#38bdf8;
}

.loading-text{
margin-top:12px;
font-size:15px;
color:#cbd5e1;
min-height:24px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="grid-bg"></div>

<div class="wrapper">

<div class="card">

<div class="logo">
ZELLA<span>.</span>
</div>

<div class="orbit">
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>
<div class="ring r4"></div>
<div class="core"></div>
<div class="scan"></div>
</div>

<div class="title">
Preparing Your Command Center
</div>

<div class="subtitle">
Loading your AI-powered crypto trading workspace.
</div>

<div class="progress-box">

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="percent" id="percent">
0%
</div>

<div class="loading-text" id="loadingText">
Initializing Zella Core...
</div>

</div>

<div style="
margin-top:30px;
padding:20px;
border-radius:24px;
background:#0f172a;
border:1px solid rgba(148,163,184,.12);
text-align:left;
">

<div id="step1" style="padding:8px 0;color:#64748b;">
● User Authentication
</div>

<div id="step2" style="padding:8px 0;color:#64748b;">
● Cloud Sync
</div>

<div id="step3" style="padding:8px 0;color:#64748b;">
● Market Intelligence
</div>

<div id="step4" style="padding:8px 0;color:#64748b;">
● AI Systems
</div>

<div id="step5" style="padding:8px 0;color:#64748b;">
● Command Center
</div>

</div>

</div>

</div>

<script>

const progressFill =
document.getElementById("progressFill");

const percent =
document.getElementById("percent");

const loadingText =
document.getElementById("loadingText");

let progress = 0;

const steps = [

{
percent:20,
text:"Verifying User Account...",
id:"step1"
},

{
percent:40,
text:"Loading Cloud Sync...",
id:"step2"
},

{
percent:60,
text:"Loading Market Intelligence...",
id:"step3"
},

{
percent:80,
text:"Preparing AI Copilot...",
id:"step4"
},

{
percent:100,
text:"Command Center Ready.",
id:"step5"
}

];

function activateStep(id){

const item =
document.getElementById(id);

item.style.color="#4ade80";
item.innerHTML="✓ " + item.textContent.replace("● ","");

}

let currentStep = 0;

const loader = setInterval(()=>{

progress += 1;

progressFill.style.width =
progress + "%";

percent.textContent =
progress + "%";

if(
currentStep < steps.length &&
progress >= steps[currentStep].percent
){

loadingText.textContent =
steps[currentStep].text;

activateStep(
steps[currentStep].id
);

currentStep++;

}

if(progress >= 100){

clearInterval(loader);

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1000);

}

},60);

</script>

</body>
</html>
