<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zella Splash V11 Ultra</title>
</head>

<body>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  overflow:hidden;
  color:white;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 15%,rgba(56,189,248,.25),transparent 30%),
    radial-gradient(circle at 80% 20%,rgba(37,99,235,.22),transparent 32%),
    radial-gradient(circle at 50% 95%,rgba(34,197,94,.10),transparent 34%),
    #020617;
}

.grid{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(56,189,248,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,.055) 1px,transparent 1px);
  background-size:42px 42px;
  animation:gridMove 18s linear infinite;
}

@keyframes gridMove{
  from{background-position:0 0}
  to{background-position:0 420px}
}

.stars span{
  position:fixed;
  width:5px;
  height:5px;
  border-radius:50%;
  background:#38bdf8;
  box-shadow:0 0 20px #38bdf8;
  animation:float 12s linear infinite;
  opacity:.55;
}

.stars span:nth-child(1){left:8%;animation-delay:0s}
.stars span:nth-child(2){left:22%;animation-delay:2s}
.stars span:nth-child(3){left:41%;animation-delay:4s}
.stars span:nth-child(4){left:60%;animation-delay:1s}
.stars span:nth-child(5){left:80%;animation-delay:3s}
.stars span:nth-child(6){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(110vh)}
  to{transform:translateY(-120px)}
}

.shell{
  position:relative;
  z-index:2;
  width:92%;
  max-width:520px;
  padding:30px 22px;
  border-radius:34px;
  text-align:center;
  background:rgba(15,23,42,.58);
  border:1px solid rgba(56,189,248,.18);
  box-shadow:0 0 55px rgba(56,189,248,.12), inset 0 0 35px rgba(56,189,248,.035);
  backdrop-filter:blur(14px);
}

.avatar{
  width:230px;
  height:230px;
  margin:0 auto 18px;
  position:relative;
}

.ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(56,189,248,.42);
  animation:spin 12s linear infinite;
}

.r1{inset:0}
.r2{inset:24px;animation-duration:18s;border-color:rgba(34,197,94,.32)}
.r3{inset:48px;animation-duration:26s;border-color:rgba(147,197,253,.22)}

.ring::before{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  top:14px;
  left:50%;
  background:#38bdf8;
  box-shadow:0 0 25px #38bdf8;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.face{
  position:absolute;
  left:50%;
  top:42px;
  transform:translateX(-50%);
  width:118px;
  height:92px;
  border-radius:44px;
  background:linear-gradient(180deg,#0f172a,#020617);
  border:2px solid rgba(56,189,248,.48);
  box-shadow:0 0 35px rgba(56,189,248,.55), inset 0 0 28px rgba(56,189,248,.13);
}

.face::before,
.face::after{
  content:"";
  position:absolute;
  top:36px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#38bdf8;
  box-shadow:0 0 20px #38bdf8;
  animation:blink 3.2s infinite;
}

.face::before{left:30px}
.face::after{right:30px}

@keyframes blink{
  0%,92%,100%{transform:scaleY(1)}
  95%{transform:scaleY(.15)}
}

.body{
  position:absolute;
  left:50%;
  bottom:42px;
  transform:translateX(-50%);
  width:140px;
  height:90px;
  border-radius:55px 55px 28px 28px;
  background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.92));
  border:1px solid rgba(56,189,248,.24);
  box-shadow:0 0 35px rgba(37,99,235,.35);
}

.core{
  position:absolute;
  left:50%;
  top:30px;
  transform:translateX(-50%);
  width:42px;
  height:42px;
  border-radius:50%;
  background:radial-gradient(circle,#e0f2fe,#38bdf8 45%,#2563eb 70%);
  box-shadow:0 0 35px rgba(56,189,248,.9);
  animation:pulse 2s ease-in-out infinite;
}

@keyframes pulse{
  50%{transform:translateX(-50%) scale(1.18);filter:brightness(1.4)}
}

.scan{
  position:absolute;
  left:35px;
  right:35px;
  top:50%;
  height:2px;
  background:linear-gradient(90deg,transparent,#38bdf8,transparent);
  box-shadow:0 0 22px rgba(56,189,248,.9);
  animation:scan 2.6s ease-in-out infinite;
}

@keyframes scan{
  0%,100%{transform:translateY(-70px);opacity:.25}
  50%{transform:translateY(70px);opacity:1}
}

.brand{
  font-size:58px;
  font-weight:950;
  letter-spacing:8px;
  background:linear-gradient(90deg,#38bdf8,#2563eb,#8b5cf6);
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 30px rgba(56,189,248,.25);
}

.subtitle{
  margin-top:8px;
  font-size:17px;
  color:#cbd5e1;
}

.welcome{
  margin-top:16px;
  font-size:14px;
  letter-spacing:3px;
  color:#38bdf8;
  font-weight:800;
}

.bar-wrap{
  width:100%;
  height:16px;
  background:rgba(15,23,42,.95);
  border:1px solid rgba(56,189,248,.14);
  border-radius:999px;
  overflow:hidden;
  margin-top:32px;
}

.bar{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#67e8f9,#2563eb,#8b5cf6);
  box-shadow:0 0 24px rgba(56,189,248,.65);
  transition:.08s linear;
}

.percent{
  margin-top:18px;
  font-size:45px;
  font-weight:950;
  color:#67e8f9;
}

.loading{
  margin-top:10px;
  color:#94a3b8;
  font-size:17px;
}

.status-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:24px;
}

.status{
  padding:12px 8px;
  border-radius:18px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;
  font-size:12px;
}

.status strong{
  display:block;
  color:#38bdf8;
  margin-bottom:4px;
}

.footer{
  margin-top:24px;
  color:#64748b;
  font-size:13px;
}

.fade-out{
  animation:fadeOut .7s forwards;
}

@keyframes fadeOut{
  to{opacity:0;transform:scale(.96)}
}
</style>

<div class="bg"></div>
<div class="grid"></div>

<div class="stars">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<section class="shell" id="shell">

  <div class="avatar">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="face"></div>
    <div class="body">
      <div class="core"></div>
    </div>
    <div class="scan"></div>
  </div>

  <div class="brand">ZELLA</div>

  <div class="subtitle">
    The Ultimate AI Crypto Assistant
  </div>

  <div class="welcome" id="welcomeText">
    WELCOME BACK, TRADER
  </div>

  <div class="bar-wrap">
    <div class="bar" id="bar"></div>
  </div>

  <div class="percent" id="percent">0%</div>

  <div class="loading" id="loadingText">
    Initializing AI Core...
  </div>

  <div class="status-grid">
    <div class="status">
      <strong id="aiStatus">BOOTING</strong>
      AI Core
    </div>

    <div class="status">
      <strong id="cloudStatus">WAITING</strong>
      Cloud
    </div>

    <div class="status">
      <strong id="securityStatus">ACTIVE</strong>
      Security
    </div>
  </div>

  <div class="footer">
    Secure • Intelligent • Unstoppable
  </div>

</section>

<script>
let progress = 0;

const shell = document.getElementById("shell");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const loadingText = document.getElementById("loadingText");

const aiStatus = document.getElementById("aiStatus");
const cloudStatus = document.getElementById("cloudStatus");
const securityStatus = document.getElementById("securityStatus");

const loader = setInterval(() => {
  progress++;

  bar.style.width = progress + "%";
  percent.textContent = progress + "%";

  if(progress <= 20){
    loadingText.textContent = "Initializing AI Core...";
    aiStatus.textContent = "BOOTING";
  }
  else if(progress <= 40){
    loadingText.textContent = "Connecting Cloud...";
    aiStatus.textContent = "ONLINE";
    cloudStatus.textContent = "SYNCING";
  }
  else if(progress <= 60){
    loadingText.textContent = "Loading Portfolio...";
    cloudStatus.textContent = "CONNECTED";
  }
  else if(progress <= 80){
    loadingText.textContent = "Syncing Watchlist...";
    securityStatus.textContent = "LOCKED";
  }
  else{
    loadingText.textContent = "Preparing Dashboard...";
    aiStatus.textContent = "READY";
    cloudStatus.textContent = "READY";
    securityStatus.textContent = "ACTIVE";
  }

  if(progress >= 100){
    clearInterval(loader);

    loadingText.textContent = "Launch Complete";

    setTimeout(() => {
      shell.classList.add("fade-out");
    },500);

    setTimeout(() => {
      window.location.href = "dashboard.html";
    },1200);
  }

},40);
</script>

</body>
</html>
